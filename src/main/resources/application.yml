spring:
  application:
    name: dotalink
  mvc:
    throw-exception-if-no-handler-found: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dotalink}
    username: ${DB_USER:dotalink}
    password: ${DB_PASSWORD:dotalink}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
  web:
    resources:
      add-mappings: true
server:
  port: ${SERVER_PORT:8080}
  error:
    whitelabel:
      enabled: false
logging:
  level:
    root: INFO
    com.example.dotalink: DEBUG

integration:
  opendota:
    base-url: ${OPENDOTA_API_BASE_URL:https://api.opendota.com}
    connect-timeout-seconds: ${OPENDOTA_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${OPENDOTA_READ_TIMEOUT_SECONDS:30}
    call-timeout-seconds: ${OPENDOTA_CALL_TIMEOUT_SECONDS:40}
