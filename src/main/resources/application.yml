spring:
  application:
    name: dotalink
  mvc:
    throw-exception-if-no-handler-found: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dotalink}
    username: ${DB_USER:dotalink}
    password: ${DB_PASSWORD:dotalink}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
  web:
    resources:
      add-mappings: true
server:
  port: ${SERVER_PORT:8080}
  error:
    whitelabel:
      enabled: false
logging:
  level:
    root: INFO
    com.example.dotalink: DEBUG

integration:
  steam:
    enabled: ${STEAM_API_ENABLED:false}
    api-key: ${STEAM_API_KEY:}
    base-url: ${STEAM_API_BASE_URL:https://api.steampowered.com}
