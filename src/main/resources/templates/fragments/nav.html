<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="topbar(showHomeButton)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">DotaLink</a>
        <div class="navbar-nav ms-auto align-items-center gap-1">
            <a class="nav-link" th:if="${showHomeButton}" th:href="@{/}">Home</a>
            <a class="nav-link" th:href="@{/posts}">Party</a>
            <a class="nav-link" th:href="@{/profile/me}">My profile</a>
            <a class="nav-link" th:href="@{/account/dota}">Dota account</a>
            <a class="nav-link" th:href="@{/login}">Login</a>
            <a class="nav-link" th:href="@{/register}">Register</a>
            <form th:action="@{/logout}" method="post" class="d-inline ms-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
