<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Players - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Players</h1>

    <form class="row g-2 mb-3" method="get" th:action="@{/players}">
        <div class="col-md-3"><input class="form-control" name="nickname" placeholder="Nickname" th:value="${filter.nickname}"></div>
        <div class="col-md-2">
            <select class="form-select" name="rank">
                <option value="">Any rank</option>
                <option th:each="rankOption : ${rankOptions}" th:value="${rankOption}" th:text="${rankOption}" th:selected="${filter.rank == rankOption}"></option>
            </select>
        </div>
        <div class="col-md-2"><input class="form-control" name="region" placeholder="Region" th:value="${filter.region}"></div>
        <div class="col-md-2">
            <select class="form-select" name="mode">
                <option value="criteria" th:selected="${filter.mode == 'criteria'}">CriteriaBuilder</option>
                <option value="jpql" th:selected="${filter.mode == 'jpql'}">JPQL</option>
            </select>
        </div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Search</button></div>
    </form>

    <div class="list-group shadow-sm mb-3">
        <a class="list-group-item list-group-item-action" th:each="p : ${playersPage.content}" th:href="@{/players/{username}(username=${p.user.username})}">
            <div class="d-flex justify-content-between">
                <strong th:text="${p.nickname}">Nickname</strong>
                <span class="text-muted" th:text="${p.rank ?: '-'}">Rank</span>
            </div>
            <small class="text-muted" th:text="${p.region ?: '-'}">Region</small>
        </a>
        <div class="list-group-item text-muted" th:if="${playersPage.totalElements == 0}">No players found.</div>
    </div>

    <nav th:if="${playersPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${playersPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/players(page=${playersPage.number - 1},size=${playersPage.size},nickname=${filter.nickname},rank=${filter.rank},region=${filter.region},mode=${filter.mode})}">Prev</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="${playersPage.number + 1} + ' / ' + ${playersPage.totalPages}"></span></li>
            <li class="page-item" th:classappend="${playersPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/players(page=${playersPage.number + 1},size=${playersPage.size},nickname=${filter.nickname},rank=${filter.rank},region=${filter.region},mode=${filter.mode})}">Next</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
