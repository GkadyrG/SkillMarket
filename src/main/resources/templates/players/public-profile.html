<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Player Profile - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Player profile</h1>
    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5" th:text="${profile.nickname}">Nickname</h2>
            <p class="mb-1"><strong>Username:</strong> <span th:text="${profile.username ?: '-'}"></span></p>
            <p class="mb-1"><strong>Rank:</strong> <span th:text="${profile.rank ?: '-'}"></span></p>
            <p class="mb-1"><strong>Region:</strong> <span th:text="${profile.region ?: '-'}"></span></p>
            <p class="mb-1"><strong>Play time:</strong> <span th:text="${profile.playTime ?: '-'}"></span></p>
            <p class="mb-1"><strong>Preferred roles:</strong> <span th:text="${profile.preferredRolesText ?: '-'}"></span></p>
            <p class="mb-2" th:text="${profile.about ?: 'No description'}"></p>
            <a class="btn btn-outline-primary btn-sm"
               th:if="${profile.username != null}"
               th:href="@{/profiles/{username}/stats(username=${profile.username})}">
                View stats
            </a>
        </div>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 mb-0">Reviews</h2>
                <span class="badge text-bg-primary" th:text="${#numbers.formatDecimal(averageRating, 1, 2)} + ' / 5'">0.00 / 5</span>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="text-muted mb-3">
                No reviews yet.
            </div>

            <div th:each="review : ${reviews}" class="border rounded p-3 mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <strong th:text="${review.authorUsername}">author</strong>
                    <span class="badge text-bg-secondary" th:text="${review.rating} + ' / 5'">5 / 5</span>
                </div>
                <p class="mb-1 mt-2" th:text="${review.comment ?: 'No comment'}"></p>
                <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</small>
            </div>

            <div th:if="${canReview}">
                <h3 class="h6 mt-4">Leave a review</h3>
                <form th:action="@{/profiles/{username}/reviews(username=${profile.username})}" th:object="${reviewForm}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label" for="rating">Rating</label>
                        <select id="rating" class="form-select" th:field="*{rating}">
                            <option value="">Select rating</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <div class="text-danger small" th:errors="*{rating}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="comment">Comment</label>
                        <textarea id="comment" class="form-control" rows="3" th:field="*{comment}"></textarea>
                        <div class="text-danger small" th:errors="*{comment}"></div>
                    </div>

                    <button class="btn btn-primary" type="submit">Submit review</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
