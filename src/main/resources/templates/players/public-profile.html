<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Player Profile - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Player profile</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5" th:text="${profile.nickname}">Nickname</h2>
            <p class="mb-1"><strong>Username:</strong> <span th:text="${profile.username ?: '-'}"></span></p>
            <p class="mb-1"><strong>Rank:</strong> <span th:text="${profile.rank ?: '-'}"></span></p>
            <p class="mb-1"><strong>Region:</strong> <span th:text="${profile.region ?: '-'}"></span></p>
            <p class="mb-1"><strong>Play time:</strong> <span th:text="${profile.playTime ?: '-'}"></span></p>
            <p class="mb-1"><strong>Preferred roles:</strong> <span th:text="${profile.preferredRolesText ?: '-'}"></span></p>
            <p class="mb-0" th:text="${profile.about ?: 'No description'}"></p>
        </div>
    </div>
</main>
</body>
</html>
