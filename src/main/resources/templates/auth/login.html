<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Login</h1>

                    <div th:if="${param.registered}" class="alert alert-success py-2">Registration successful. Please login.</div>
                    <div th:if="${param.logout}" class="alert alert-info py-2">You are logged out.</div>
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

                    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input id="username" th:field="*{username}" class="form-control" required>
                            <div class="text-danger small" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input id="password" th:field="*{password}" type="password" class="form-control" required>
                            <div class="text-danger small" th:errors="*{password}"></div>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3 mb-0">No account? <a th:href="@{/register}">Register</a></p>
        </div>
    </div>
</main>
</body>
</html>
