<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review Analytics - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Review analytics</h1>
        <a class="btn btn-outline-secondary" th:href="@{/}">Home</a>
    </div>

    <p class="text-muted mb-3">
        Users with average rating above platform average (minimum reviews: <span th:text="${minReviews}">1</span>).
    </p>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(leaders)}" class="text-muted">
                No users match the criteria.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(leaders)}">
                <table class="table table-sm align-middle mb-0">
                    <thead>
                    <tr>
                        <th>User</th>
                        <th>Nickname</th>
                        <th>Average rating</th>
                        <th>Reviews count</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${leaders}">
                        <td>
                            <a th:href="@{/profiles/{username}(username=${row.username})}"
                               th:text="${row.username}">username</a>
                        </td>
                        <td th:text="${row.nickname ?: '-'}">nickname</td>
                        <td th:text="${#numbers.formatDecimal(row.averageRating, 1, 2)}">0.00</td>
                        <td th:text="${row.reviewsCount}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
