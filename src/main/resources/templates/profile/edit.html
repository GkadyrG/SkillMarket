<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Edit profile</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/profile/edit}" th:object="${profileForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label" for="nickname">Nickname</label>
                    <input id="nickname" class="form-control" th:field="*{nickname}">
                    <div class="text-danger small" th:errors="*{nickname}"></div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="rank">Rank</label>
                        <select id="rank" class="form-select" th:field="*{rank}">
                            <option value="">Not set</option>
                            <option th:each="rankOption : ${rankOptions}" th:value="${rankOption}" th:text="${rankOption}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{rank}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="region">Region</label>
                        <input id="region" class="form-control" th:field="*{region}">
                        <div class="text-danger small" th:errors="*{region}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="playTime">Play time</label>
                        <input id="playTime" class="form-control" th:field="*{playTime}">
                        <div class="text-danger small" th:errors="*{playTime}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="preferredRolesText">Preferred roles</label>
                    <input id="preferredRolesText" class="form-control" th:field="*{preferredRolesText}">
                    <div class="text-danger small" th:errors="*{preferredRolesText}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="about">About</label>
                    <textarea id="about" class="form-control" rows="4" th:field="*{about}"></textarea>
                    <div class="text-danger small" th:errors="*{about}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Favorite heroes</label>
                    <select class="form-select" multiple th:field="*{favoriteHeroIds}">
                        <option th:each="hero : ${heroes}" th:value="${hero.id}" th:text="${hero.name}"></option>
                    </select>
                    <div class="form-text">Hold Ctrl/Cmd to select multiple heroes.</div>
                </div>

                <button class="btn btn-success" type="submit">Save changes</button>
                <a class="btn btn-outline-secondary" th:href="@{/profile/me}">Cancel</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
