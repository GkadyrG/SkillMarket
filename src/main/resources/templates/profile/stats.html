<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Stats - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">User stats</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary" th:href="@{/profiles/stats/review-leaders}">Review analytics</a>
            <a class="btn btn-outline-secondary" th:href="@{/profiles/{username}(username=${stats.username})}">Back to profile</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3" th:text="${stats.nickname} + ' (' + ${stats.username} + ')'">Nickname (username)</h2>

            <p class="mb-2"><strong>Rank tier:</strong> <span th:text="${stats.rankTier ?: '-'}">-</span></p>
            <p class="mb-2"><strong>Average rating:</strong> <span th:text="${#numbers.formatDecimal(stats.averageRating, 1, 2)} + ' / 5'">0.00 / 5</span></p>
            <p class="mb-3"><strong>Reviews count:</strong> <span th:text="${stats.reviewsCount}">0</span></p>

            <h3 class="h6 mb-2">Favorite heroes</h3>
            <div th:if="${#lists.isEmpty(stats.favoriteHeroes)}" class="text-muted">No favorite heroes selected.</div>
            <ul class="mb-0" th:if="${!#lists.isEmpty(stats.favoriteHeroes)}">
                <li th:each="hero : ${stats.favoriteHeroes}" th:text="${hero}">Hero</li>
            </ul>
        </div>
    </div>
</main>
</body>
</html>
