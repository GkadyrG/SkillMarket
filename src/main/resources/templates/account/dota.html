<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dota Account - DotaLink</title>
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Dota account</h1>

    <div class="alert py-2" th:classappend="${steamIntegrationEnabled} ? 'alert-success' : 'alert-secondary'">
        Steam sync: <strong th:text="${steamIntegrationEnabled} ? 'enabled' : 'disabled (stub mode)'"></strong>
    </div>

    <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>

    <div class="card shadow-sm mb-3" th:if="${account != null}">
        <div class="card-body">
            <h2 class="h5">Linked account</h2>
            <p class="mb-1"><strong>Steam ID:</strong> <span th:text="${account.steamId}"></span></p>
            <p class="mb-1"><strong>Account ID:</strong> <span th:text="${account.accountId ?: '-'}"></span></p>
            <p class="mb-1"><strong>Profile:</strong>
                <a th:if="${account.profileUrl}" th:href="${account.profileUrl}" th:text="${account.profileUrl}" target="_blank" rel="noreferrer"></a>
                <span th:unless="${account.profileUrl}">-</span>
            </p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/account/dota}" th:object="${dotaAccountForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label" for="steamId">Steam ID</label>
                    <input id="steamId" class="form-control" th:field="*{steamId}" required>
                    <div class="text-danger small" th:errors="*{steamId}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="accountId">Account ID (optional)</label>
                    <input id="accountId" class="form-control" th:field="*{accountId}">
                    <div class="text-danger small" th:errors="*{accountId}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="profileUrl">Profile URL (optional)</label>
                    <input id="profileUrl" class="form-control" th:field="*{profileUrl}">
                    <div class="text-danger small" th:errors="*{profileUrl}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="avatarUrl">Avatar URL (optional)</label>
                    <input id="avatarUrl" class="form-control" th:field="*{avatarUrl}">
                    <div class="text-danger small" th:errors="*{avatarUrl}"></div>
                </div>

                <button class="btn btn-success" type="submit">Save (PRG)</button>
                <button id="ajax-save-btn" class="btn btn-outline-primary" type="button" th:attr="data-has-account=${account != null}">Save via AJAX</button>
            </form>

            <form th:if="${account != null}" th:action="@{/account/dota/delete}" method="post" class="mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-outline-danger" type="submit">Unlink Dota account</button>
                <button id="ajax-delete-btn" class="btn btn-danger" type="button">Delete via AJAX</button>
            </form>

            <div id="ajax-result" class="small mt-3"></div>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/dota-account.js}"></script>
</body>
</html>
