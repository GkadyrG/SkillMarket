<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Party Post Form - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3" th:text="${editMode} ? 'Edit party post' : 'Create party post'">Party post</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${editMode} ? @{/posts/{id}(id=${postId})} : @{/posts}" th:object="${postForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label" for="title">Title</label>
                    <input id="title" class="form-control" th:field="*{title}">
                    <div class="text-danger small" th:errors="*{title}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" rows="4" class="form-control" th:field="*{description}"></textarea>
                    <div class="text-danger small" th:errors="*{description}"></div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="requiredRank">Required rank</label>
                        <select id="requiredRank" class="form-select" th:field="*{requiredRank}">
                            <option value="">Any rank</option>
                            <option th:each="rankOption : ${rankOptions}" th:value="${rankOption}" th:text="${rankOption}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{requiredRank}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="roleNeeded">Role needed</label>
                        <select id="roleNeeded" class="form-select" th:field="*{roleNeeded}">
                            <option value="">Any role</option>
                            <option th:each="roleOption : ${roleOptions}" th:value="${roleOption}" th:text="${roleOption}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{roleNeeded}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" for="region">Region</label>
                        <select id="region" class="form-select" th:field="*{region}">
                            <option value="">Any region</option>
                            <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{region}"></div>
                    </div>
                </div>
                <div class="mb-3" th:if="${editMode}">
                    <label class="form-label" for="status">Status</label>
                    <select id="status" class="form-select" th:field="*{status}">
                        <option value="OPEN">OPEN</option>
                        <option value="CLOSED">CLOSED</option>
                    </select>
                    <div class="text-danger small" th:errors="*{status}"></div>
                </div>
                <button class="btn btn-success" type="submit">Save</button>
                <a class="btn btn-outline-secondary" th:href="@{/posts}">Cancel</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
