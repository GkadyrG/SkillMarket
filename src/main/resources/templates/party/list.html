<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Party Posts - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Party posts</h1>
        <a class="btn btn-primary" th:href="@{/posts/create}">Create post</a>
    </div>

    <form class="card card-body mb-4" th:action="@{/posts}" method="get" th:object="${filter}">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="rank">Rank</label>
                <select id="rank" class="form-select" th:field="*{rank}">
                    <option value="">Any rank</option>
                    <option th:each="rankOption : ${rankOptions}" th:value="${rankOption}" th:text="${rankOption}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="role">Role</label>
                <select id="role" class="form-select" th:field="*{role}">
                    <option value="">Any role</option>
                    <option th:each="roleOption : ${roleOptions}" th:value="${roleOption}" th:text="${roleOption}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="region">Region</label>
                <select id="region" class="form-select" th:field="*{region}">
                    <option value="">Any region</option>
                    <option th:each="regionOption : ${regionOptions}" th:value="${regionOption}" th:text="${regionOption}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="mode">Search mode</label>
                <select id="mode" class="form-select" th:field="*{mode}">
                    <option value="criteria">CriteriaBuilder</option>
                    <option value="jpql">JPQL</option>
                </select>
            </div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-dark" type="submit">Filter</button>
            <a class="btn btn-outline-secondary" th:href="@{/posts}">Reset</a>
        </div>
    </form>

    <div class="card shadow-sm mb-3" th:each="post : ${postsPage.content}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h2 class="h5 mb-1"><a class="text-decoration-none" th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">Post</a></h2>
                    <p class="text-muted mb-2">
                        <span th:text="${post.authorUsername}">author</span>
                        <span> | </span>
                        <span th:text="${post.region ?: 'Any region'}">region</span>
                        <span> | </span>
                        <span th:text="${post.requiredRank ?: 'Any rank'}">rank</span>
                        <span> | </span>
                        <span th:text="${post.roleNeeded ?: 'Any role'}">role</span>
                    </p>
                </div>
                <span class="badge text-bg-success" th:text="${post.status}">OPEN</span>
            </div>
            <p class="mb-2" th:text="${post.description ?: 'No description'}"></p>
            <small class="text-muted">Applications: <span th:text="${post.applicationsCount}">0</span></small>
        </div>
    </div>

    <div th:if="${postsPage.isEmpty()}" class="alert alert-secondary">No posts found.</div>

    <nav th:if="${postsPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${postsPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/posts(page=${postsPage.number - 1}, rank=${filter.rank}, role=${filter.role}, region=${filter.region}, mode=${filter.mode})}">Previous</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${postsPage.number + 1} + ' / ' + ${postsPage.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${postsPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/posts(page=${postsPage.number + 1}, rank=${filter.rank}, role=${filter.role}, region=${filter.region}, mode=${filter.mode})}">Next</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
