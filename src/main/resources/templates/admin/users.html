<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Users - DotaLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: topbar(true)}"></div>
<main class="container py-4">
    <h1 class="h3 mb-3">Admin: Users</h1>

    <div class="table-responsive bg-white shadow-sm rounded-3 p-2">
        <table class="table table-striped align-middle mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Enabled</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usersPage.content}">
                <td th:text="${u.id}">1</td>
                <td th:text="${u.username}">username</td>
                <td th:text="${u.email}">email</td>
                <td th:text="${u.role}">role</td>
                <td th:text="${u.enabled}">true</td>
                <td><a th:href="@{/players/{username}(username=${u.username})}" class="btn btn-sm btn-outline-primary">View</a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-3" th:if="${usersPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${usersPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${usersPage.number - 1},size=${usersPage.size})}">Prev</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="${usersPage.number + 1} + ' / ' + ${usersPage.totalPages}"></span></li>
            <li class="page-item" th:classappend="${usersPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${usersPage.number + 1},size=${usersPage.size})}">Next</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
