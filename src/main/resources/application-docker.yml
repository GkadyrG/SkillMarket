spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:dotalink}
    username: ${DB_USER:dotalink}
    password: ${DB_PASSWORD:dotalink}

integration:
  opendota:
    base-url: ${OPENDOTA_API_BASE_URL:https://api.opendota.com}
    connect-timeout-seconds: ${OPENDOTA_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${OPENDOTA_READ_TIMEOUT_SECONDS:30}
    call-timeout-seconds: ${OPENDOTA_CALL_TIMEOUT_SECONDS:40}
