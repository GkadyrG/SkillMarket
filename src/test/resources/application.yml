spring:
  datasource:
    url: jdbc:h2:mem:dotalink_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  thymeleaf:
    cache: false

logging:
  level:
    root: WARN
    com.example.dotalink: INFO
