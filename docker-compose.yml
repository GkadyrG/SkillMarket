services:
  postgres:
    image: postgres:16-alpine
    container_name: dotalink-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dotalink}
      POSTGRES_USER: ${DB_USER:-dotalink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dotalink}
    ports:
      - "5432:5432"
    volumes:
      - dotalink_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotalink-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dotalink}
      DB_USER: ${DB_USER:-dotalink}
      DB_PASSWORD: ${DB_PASSWORD:-dotalink}
      SERVER_PORT: 8080
      STEAM_API_ENABLED: ${STEAM_API_ENABLED:-false}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      STEAM_API_BASE_URL: ${STEAM_API_BASE_URL:-https://api.steampowered.com}
    ports:
      - "8080:8080"

volumes:
  dotalink_pg_data:
